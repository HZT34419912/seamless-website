<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner - SEAMLESS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
      background: #0a0a0a; 
      color: #fff; 
      min-height: 100vh;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(10px);
    }
    .nav-left { display: flex; align-items: center; gap: 40px; }
    .nav-logo { cursor: pointer; }
    .nav-logo img { width: 120px; }
    .nav-links { display: flex; gap: 30px; }
    .nav-links a { 
      color: #888; 
      text-decoration: none; 
      font-size: 14px; 
      letter-spacing: 1px;
      transition: color 0.3s;
    }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .back-btn { color: #888; text-decoration: none; font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: color 0.3s; }
    .back-btn:hover { color: #fff; }
    .lang-switcher { display: flex; gap: 10px; }
    .lang-btn {
      background: transparent;
      border: 1px solid #333;
      color: #666;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .lang-btn.active { border-color: #fff; color: #fff; }
    .lang-btn:hover { border-color: #fff; color: #fff; }
    
    .content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-top: 80px;
    }
    .coming-soon {
      text-align: center;
    }
    .coming-soon h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 8px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .coming-soon p {
      font-size: 16px;
      color: #666;
      letter-spacing: 2px;
    }
    
    /* Mobile */
    @media (max-width: 768px) {
      nav { padding: 15px 20px; }
      .nav-links { display: none; }
      .coming-soon h1 { font-size: 28px; letter-spacing: 4px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <div class="nav-logo" onclick="location.replace('seamless-new.html#main')">
        <img src="logo-C.png" alt="SEAMLESS">
      </div>
      <div class="nav-links">
        <a href="javascript:location.replace('seamless-new.html#inspiration')" data-i18n="nav_inspiration">Inspiration</a>
        <a href="javascript:location.replace('seamless-new.html#products')" data-i18n="nav_products">Products</a>
        <a href="javascript:location.replace('seamless-new.html#philosophy')" data-i18n="nav_philosophy">Philosophy</a>
        <a href="javascript:location.replace('seamless-new.html#contact')" data-i18n="nav_contact">Contact</a>
      </div>
    </div>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">中文</button>
        <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja')">日本語</button>
      </div>
      <a class="back-btn" href="javascript:history.back()" data-i18n="nav_back">← Back</a>
    </div>
  </nav>

  <div class="content">
    <div class="coming-soon">
      <h1 data-i18n="partner_title">合伙人机制正在构建中</h1>
      <p data-i18n="partner_subtitle">敬请期待</p>
    </div>
  </div>

  <script>
    const translations = {
      en: {
        nav_inspiration: "Inspiration",
        nav_products: "Products",
        nav_philosophy: "Philosophy",
        nav_contact: "Contact",
        nav_back: "← Back",
        partner_title: "PARTNER MECHANISM",
        partner_subtitle: "COMING SOON"
      },
      zh: {
        nav_inspiration: "灵感",
        nav_products: "产品",
        nav_philosophy: "理念",
        nav_contact: "联系",
        nav_back: "← 返回",
        partner_title: "合伙人机制正在构建中",
        partner_subtitle: "敬请期待"
      },
      ja: {
        nav_inspiration: "インスピレーション",
        nav_products: "製品",
        nav_philosophy: "哲学",
        nav_contact: "お問い合わせ",
        nav_back: "← 戻る",
        partner_title: "パートナーシップ制度",
        partner_subtitle: "近日公開"
      }
    };

    function getInitialLang() {
      const hash = window.location.hash;
      if (hash === '#zh') return 'zh';
      if (hash === '#ja') return 'ja';
      return 'en';
    }

    function setLanguage(lang) {
      const t = translations[lang];
      if (!t) return;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });
      document.querySelectorAll('.nav-links a').forEach(link => {
        const href = link.getAttribute('href');
        if (href && href !== '#') {
          link.classList.toggle('active', window.location.pathname.endsWith(href));
        }
      });
      document.documentElement.lang = lang === 'ja' ? 'ja' : (lang === 'zh' ? 'zh-CN' : 'en');
    }

    setLanguage(getInitialLang());
  </script>
</body>
</html>
