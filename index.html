<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEAMLESS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #000000; color: #ffffff; overflow: hidden; }
    
    /* Entry Page */
    .entry-page { position: fixed; inset: 0; background: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
    .entry-logo { width: 400px; height: 400px; display: flex; align-items: center; justify-content: center; animation: breathe 2s ease-in-out infinite; position: relative; }
    .entry-logo::before { content: ''; position: absolute; width: 100%; height: 100%; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; animation: pulse-ring 2s ease-in-out infinite; }
    .entry-logo-text { font-size: 24px; font-weight: 600; letter-spacing: 8px; color: #ffffff; }
    .entry-hint { margin-top: 60px; font-size: 14px; letter-spacing: 3px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
    .entry-hint-2 { margin-top: 20px; font-size: 12px; letter-spacing: 2px; color: rgba(255,255,255,0.3); }
    
    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0; } }
  </style>
</head>
<body>
  <!-- Entry Page -->
  <div class="entry-page" onclick="location.href='seamless-new.html'">
    <div class="entry-logo" onclick="event.stopPropagation();location.href='seamless-new.html'">
      <img src="logo-A.png" alt="SEAMLESS" style="width:280px;">
    </div>
    <p class="entry-hint">Tap to Enter</p>
    <p class="entry-hint-2">点击进入</p>
    <p class="entry-hint-2">タップして入場</p>
  </div>
</body>
</html>
