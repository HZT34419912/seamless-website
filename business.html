<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business - SEAMLESS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #000000; color: #ffffff; overflow-x: hidden; }
    .nav { position: fixed; top: 0; left: 0; right: 0; height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; background: rgba(10,10,10,0.9); backdrop-filter: blur(20px); z-index: 50; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-left { display: flex; align-items: center; gap: 60px; }
    .nav-logo { font-size: 18px; font-weight: 700; letter-spacing: 4px; cursor: pointer; }
    .nav-links { display: flex; gap: 40px; }
    .nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; letter-spacing: 1px; transition: color 0.3s; }
    .nav-links a:hover { color: #ffffff; }
    .nav-right { display: flex; align-items: center; gap: 30px; }
    .back-btn { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; letter-spacing: 1px; cursor: pointer; }
    .back-btn:hover { color: #ffffff; }
    .lang-switcher { display: flex; align-items: center; gap: 8px; }
    .lang-btn { font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.5); cursor: pointer; padding: 6px 10px; border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; background: transparent; transition: all 0.3s; font-family: inherit; }
    .lang-btn:hover, .lang-btn.active { color: #ffffff; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); }
    .lang-btn.active { border-color: #ffffff; }
    .page-content { padding: 120px 60px 60px; }
    .page-title { font-size: 64px; font-weight: 700; margin-bottom: 20px; }
    .page-subtitle { font-size: 18px; color: rgba(255,255,255,0.6); max-width: 500px; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-left">
      <div class="nav-logo"><img src="logo-C.png" onclick="location.replace('seamless-new.html#main')" alt="SEAMLESS" style="width:120px;cursor:pointer;"></div>
      <div class="nav-links">
        <a href="javascript:location.replace('seamless-new.html#inspiration')" data-i18n="nav_inspiration">Inspiration</a>
        <a href="javascript:location.replace('seamless-new.html#products')" data-i18n="nav_products">Products</a>
        <a href="javascript:location.replace('seamless-new.html#philosophy')" data-i18n="nav_philosophy">Philosophy</a>
        <a href="javascript:location.replace('seamless-new.html#contact')" data-i18n="nav_contact">Contact</a>
      </div>
    </div>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">中文</button>
        <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja')">日本語</button>
      </div>
      <a class="back-btn" href="javascript:location.replace('seamless-new.html#main')" data-i18n="nav_back">← Back</a>
    </div>
  </nav>
  <div class="page-content">
    <h1 class="page-title" data-i18n="page_title">Business</h1>
    <p class="page-subtitle">[Page content to be added]</p>
  </div>

  <script>
    const translations = {
      en: { 
        page_title: "Business",
        nav_inspiration: "Inspiration",
        nav_products: "Products",
        nav_philosophy: "Philosophy",
        nav_contact: "Contact",
        nav_back: "← Back"
      },
      zh: { 
        page_title: "商务合作",
        nav_inspiration: "灵感",
        nav_products: "产品",
        nav_philosophy: "理念",
        nav_contact: "联系",
        nav_back: "← 返回"
      },
      ja: { 
        page_title: "ビジネス",
        nav_inspiration: "インスピレーション",
        nav_products: "製品",
        nav_philosophy: "フィロソフィー",
        nav_contact: "お問い合わせ",
        nav_back: "← 戻る"
      }
    };

    function getInitialLang() {
      const hash = window.location.hash;
      if (hash === '#zh') return 'zh';
      if (hash === '#ja') return 'ja';
      return 'en';
    }

    function setLanguage(lang) {
      const t = translations[lang];
      if (!t) return;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });
      document.documentElement.lang = lang === 'ja' ? 'ja' : (lang === 'zh' ? 'zh-CN' : 'en');
    }

    setLanguage(getInitialLang());
  </script>
</body>
</html>
